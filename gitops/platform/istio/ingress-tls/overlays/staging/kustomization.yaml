apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Certificate
      name: istio-ingressgateway-certs
    patch: |
      - op: replace
        path: /spec/dnsNames/0
        value: staging.gateway.example.com
  - target:
      kind: Gateway
      name: ingress-gateway
    patch: |
      - op: replace
        path: /spec/servers/0/hosts/0
        value: staging.gateway.example.com
