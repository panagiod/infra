# Kind / lab: avoid PVC provisioning (local-path PVs use hostPath, blocked by Kyverno).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchbase
  namespace: couchbase
spec:
  volumeClaimTemplates: []
  template:
    spec:
      volumes:
        - name: data
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: couchbase-init
            defaultMode: 0755
