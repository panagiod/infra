# CIS 5.2.x — disallow hostPath volumes (path-based node access).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cis-disallow-host-path
  annotations:
    policies.kyverno.io/title: Disallow hostPath Volumes
    policies.kyverno.io/category: CIS
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-path
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - cert-manager
                - istio-system
                - monitoring
                - kyverno
                - argocd
                - couchbase
      validate:
        message: "hostPath volumes are not allowed."
        pattern:
          spec:
            =(volumes):
              - X(hostPath): "null"
