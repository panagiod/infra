# Base Kustomization for platform Kyverno policies deployed by platform-policies app.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - require-istio-injection.yaml
  - disallow-privileged-containers.yaml
  - disallow-host-namespaces.yaml
  - disallow-host-path.yaml
  - require-run-as-non-root.yaml
  - require-drop-all-capabilities.yaml
  - require-seccomp-runtime-default.yaml
