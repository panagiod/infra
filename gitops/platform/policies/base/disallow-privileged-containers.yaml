# CIS 5.2.x — disallow privileged containers (workload namespaces).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cis-disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: CIS
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - cert-manager
                - istio-system
                - monitoring
                - kyverno
                - argocd
                - couchbase
      validate:
        message: "Privileged containers are not allowed (CIS 5.2.x)."
        pattern:
          spec:
            =(ephemeralContainers):
              - =(securityContext):
                  =(privileged): "false"
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false"
            containers:
              - =(securityContext):
                  =(privileged): "false"
