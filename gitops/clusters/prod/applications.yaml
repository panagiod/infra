# -----------------------------------------------------------------------------
# couchbase — Couchbase cluster (production overlay values)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: couchbase
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://couchbase-partners.github.io/helm-charts
    chart: couchbase-operator
    targetRevision: '*'
    helm:
      releaseName: couchbase
      values: |
        install:
          couchbaseOperator: true
          admissionController: false
          couchbaseCluster: true
          syncGateway: false
        cluster:
          image: couchbase/server:community-8.0.1
          antiAffinity: true
          name: couchbase
          security:
            adminSecret: couchbase-admin-secret
          servers:
            default:
              size: 3
              services:
                - data
                - index
                - query
        buckets:
          default: null
          kubeship:
            memoryQuota: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: couchbase
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
