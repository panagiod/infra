# =============================================================================
# PRODUCTION CLUSTER — Argo CD Application definitions
# =============================================================================
# Same platform stack as staging, tuned for production: longer metric retention,
# prod overlays for CA and demo app, and no staging-only tracing defaults.
# Sync waves ensure cert-manager → CA → Istio → policies → apps install safely.
# =============================================================================

# -----------------------------------------------------------------------------
# cert-manager — TLS certificate automation
# -----------------------------------------------------------------------------
# Foundation for all in-cluster TLS. Issues and renews certificates used by
# Istio CSR and any Application that requests certs via cert-manager CRs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# platform-ca — Internal certificate authority for the mesh
# -----------------------------------------------------------------------------
# Production overlay for the platform CA. Signs certs that Istio and workloads
# trust cluster-wide. Requires cert-manager to be healthy first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ca
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/cert-manager/overlays/prod  # Production CA overlay
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  dependsOn:
    - name: cert-manager
      namespace: argocd
---
# -----------------------------------------------------------------------------
# istio-base — Istio CRDs and cluster-wide foundations
# -----------------------------------------------------------------------------
# Installs Istio custom resources and base configuration before the control plane.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    helm:
      releaseName: istio-base
      values: |
        defaultRevision: default
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istiod — Istio control plane (mesh brain)
# -----------------------------------------------------------------------------
# Runs the Istio discovery and configuration service. Production omits staging
# Zipkin defaults to keep mesh config minimal; add tracing via meshConfig if needed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    helm:
      releaseName: istiod
      values: |
        global:
          istioNamespace: istio-system
        meshConfig:
          enablePrometheusMerge: true
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  dependsOn:
    - name: istio-base
      namespace: argocd
---
# -----------------------------------------------------------------------------
# istio-csr — cert-manager integration for Istio TLS
# -----------------------------------------------------------------------------
# Issues istiod's serving certificate from platform-ca-issuer for a unified
# trust chain across the production mesh.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-csr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager-istio-csr
    helm:
      releaseName: istio-csr
      values: |
        app:
          issuer:
            group: cert-manager.io
            kind: ClusterIssuer
            name: platform-ca-issuer
        certificate:
          dnsNames:
            - istiod.istio-system.svc
          mountNames:
            istiodCert: istiod
            rootCert: root-cert
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  dependsOn:
    - name: platform-ca
      namespace: argocd
    - name: istiod
      namespace: argocd
---
# -----------------------------------------------------------------------------
# istio-gateway — Ingress gateway (north-south traffic)
# -----------------------------------------------------------------------------
# Entry point for external traffic into the service mesh via a cloud LoadBalancer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    helm:
      releaseName: istio-ingressgateway
      values: |
        name: istio-ingressgateway
        service:
          type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  dependsOn:
    - name: istiod
      namespace: argocd
---
# -----------------------------------------------------------------------------
# istio-policies — Mesh-wide security defaults (mTLS STRICT)
# -----------------------------------------------------------------------------
# Enforces mutual TLS for the production mesh by syncing PeerAuthentication
# policies from Git into istio-system and workload namespaces.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/istio/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  dependsOn:
    - name: istiod
      namespace: argocd
---
# -----------------------------------------------------------------------------
# monitoring — Prometheus, Grafana, and Alertmanager
# -----------------------------------------------------------------------------
# Production observability with 30-day Prometheus retention and Grafana dashboards.
# Rotate adminPassword and wire Alertmanager receivers for on-call workflows.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true
          adminPassword: changeme  # Must be changed for production Grafana access
        prometheus:
          prometheusSpec:
            retention: 30d  # Longer history than staging for incident investigation
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
        alertmanager:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# kyverno — Policy engine for cluster guardrails
# -----------------------------------------------------------------------------
# Admission controller that enforces organizational policies on create/update.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    helm:
      releaseName: kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# platform-policies — Kyverno policies from Git (cluster standards)
# -----------------------------------------------------------------------------
# Cluster-wide validation rules (e.g. Istio injection on mtls-demo) applied
# after the Kyverno controller is running.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/policies/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  dependsOn:
    - name: kyverno
      namespace: argocd
---
# -----------------------------------------------------------------------------
# mtls-demo — Sample app to verify mTLS in production
# -----------------------------------------------------------------------------
# Production overlay scales frontend and backend to 2 replicas each. Validates
# that mesh security policies work under slightly higher load than staging.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mtls-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/apps/mtls-demo/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: mtls-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  dependsOn:
    - name: istio-policies
      namespace: argocd
