# =============================================================================
# PRODUCTION CLUSTER — Argo CD Application definitions
# =============================================================================
# Same platform stack as staging, tuned for production: longer metric retention,
# prod overlays for CA and demo app, and no staging-only tracing defaults.
# Install order is enforced by automated PR validation wait steps (Kind smoke)
# and operational runbooks — not Argo CD dependsOn.
# =============================================================================

# -----------------------------------------------------------------------------
# cert-manager — TLS certificate automation
# -----------------------------------------------------------------------------
# Foundation for all in-cluster TLS. Issues and renews certificates used by
# Istio CSR and any Application that requests certs via cert-manager CRs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: '*'
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        prometheus:
          enabled: true
          servicemonitor:
            enabled: false  # Prometheus Operator not installed until monitoring app
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# platform-ca — Internal certificate authority for the mesh
# -----------------------------------------------------------------------------
# Production overlay for the platform CA. Signs certs that Istio and workloads
# trust cluster-wide. Requires cert-manager to be healthy first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ca
  namespace: argocd
  labels:
    infra.platform/git-source: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/cert-manager/overlays/prod  # Production CA overlay
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-base — Istio CRDs and cluster-wide foundations
# -----------------------------------------------------------------------------
# Installs Istio custom resources and base configuration before the control plane.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: '*'
    helm:
      releaseName: istio-base
      values: |
        defaultRevision: default
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-csr — cert-manager integration for Istio TLS
# -----------------------------------------------------------------------------
# Must install before istiod (cert-manager docs: istio-csr before Istio).
# Issues istiod's serving certificate from platform-ca-issuer for a unified
# trust chain across the production mesh.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-csr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager-istio-csr
    targetRevision: '*'
    helm:
      releaseName: istio-csr
      values: |
        app:
          certmanager:
            namespace: istio-system
            issuer:
              enabled: true
              name: platform-ca-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          tls:
            istiodCertificateEnable: true
            istiodAdditionalDNSNames:
              - istiod.istio-system.svc
          istio:
            namespace: istio-system
            revisions:
              - default
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istiod — Istio control plane (mesh brain)
# -----------------------------------------------------------------------------
# Runs the Istio discovery and configuration service. Configured for cert-manager
# istio-csr (built-in CA disabled). Production omits staging Zipkin defaults.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: '*'
    helm:
      releaseName: istiod
      values: |
        global:
          istioNamespace: istio-system
          caAddress: cert-manager-istio-csr.cert-manager.svc:443
        pilot:
          env:
            ENABLE_CA_SERVER: "false"
        meshConfig:
          enablePrometheusMerge: true
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-gateway — Ingress gateway (north-south traffic)
# -----------------------------------------------------------------------------
# Entry point for external traffic into the service mesh via a cloud LoadBalancer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: '*'
    helm:
      releaseName: istio-ingressgateway
      values: |
        name: istio-ingressgateway
        service:
          type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
