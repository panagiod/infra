  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# -----------------------------------------------------------------------------
# monitoring — Prometheus, Grafana, and Alertmanager
# -----------------------------------------------------------------------------
# Production observability with 30-day Prometheus retention and Grafana dashboards.
# Rotate adminPassword and wire Alertmanager receivers for on-call workflows.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: '*'
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
        prometheus:
          prometheusSpec:
            retention: 30d  # Longer history than staging for incident investigation
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: default
              group_by: ['alertname', 'namespace']
              routes:
                - matchers:
                    - severity = critical
                  receiver: critical
                - matchers:
                    - severity = warning
                  receiver: warning
            receivers:
              - name: default
              - name: critical
                slack_configs:
                  - channel: '#platform-critical'
                    send_resolved: true
                    title: '{{ .CommonAnnotations.summary }}'
                    text: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.description }}'
                    api_url: 'REPLACE_WITH_SLACK_WEBHOOK'
              - name: warning
                slack_configs:
                  - channel: '#platform-warning'
                    send_resolved: true
                    title: '{{ .CommonAnnotations.summary }}'
                    api_url: 'REPLACE_WITH_SLACK_WEBHOOK'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
