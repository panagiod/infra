# -----------------------------------------------------------------------------
# monitoring — Prometheus, Grafana, and Alertmanager
# -----------------------------------------------------------------------------
# Production observability with 30-day Prometheus retention and Grafana dashboards.
# Alertmanager uses the null receiver until on-call routing is wired — see
# docs/operations/alerting.md before go-live.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: '*'
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
        prometheus:
          prometheusSpec:
            retention: 30d  # Longer history than staging for incident investigation
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: 'null'
              group_by: ['alertname', 'namespace']
            receivers:
              - name: 'null'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
