# Kustomize entry point for the staging cluster bootstrap.
# Argo CD (or `kubectl apply -k`) uses this file to find which manifests to deploy.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# List every YAML file (or subdirectory) that makes up this cluster's GitOps bundle.
resources:
  - applications.yaml  # All Argo CD Application CRs for staging platform + apps
