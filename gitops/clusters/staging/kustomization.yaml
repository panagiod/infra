# Kustomize entry point for the prod cluster bootstrap.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - applications.yaml

configMapGenerator:
  - name: cluster-config
    envs:
      - cluster.env
    options:
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.GITOPS_REPO_URL
    targets:
      - select:
          kind: Application
          labelSelector: infra.platform/git-source=true
        fieldPaths:
          - spec.source.repoURL

  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.GITOPS_TARGET_REVISION
    targets:
      - select:
          kind: Application
          labelSelector: infra.platform/git-source=true
        fieldPaths:
          - spec.source.targetRevision
