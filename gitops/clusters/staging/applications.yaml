# =============================================================================
# STAGING CLUSTER — Argo CD Application definitions
# =============================================================================
# This file tells Argo CD what to deploy on the staging cluster and in what
# order. Each "Application" is one deployable unit (a Helm chart or a folder
# of YAML from this Git repo). Install order is enforced by automated PR
# validation wait steps (Kind smoke) and operational runbooks — not Argo CD dependsOn.
# =============================================================================

# -----------------------------------------------------------------------------
# cert-manager — TLS certificate automation
# -----------------------------------------------------------------------------
# Installs cert-manager, which issues and renews TLS certificates inside the
# cluster. Everything that needs HTTPS (Istio, apps) depends on this running
# first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd  # Argo CD stores Application CRs in the argocd namespace
  finalizers:
    # Ensures child resources are cleaned up if this Application is deleted
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default  # Argo CD project (RBAC / allowed repos); default is permissive
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: '*'
    helm:
      releaseName: cert-manager  # Name of the Helm release in the cluster
      values: |
        installCRDs: true  # Install Custom Resource Definitions cert-manager needs
        prometheus:
          enabled: true  # Expose metrics for monitoring
          servicemonitor:
            enabled: false  # Prometheus Operator not installed until monitoring app
  destination:
    server: https://kubernetes.default.svc  # Deploy to the local cluster Argo runs on
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true    # Remove cluster objects removed from Git/Helm values
      selfHeal: true # Re-apply if someone changes resources by hand
    syncOptions:
      - CreateNamespace=true   # Create cert-manager namespace if missing
      - ServerSideApply=true # Safer apply for large CRDs and controllers
---
# -----------------------------------------------------------------------------
# platform-ca — Internal certificate authority for the mesh
# -----------------------------------------------------------------------------
# Deploys our own CA (Certificate Authority) using cert-manager manifests from
# this repo. Istio and other services trust certs signed by this CA. Must run
# after cert-manager because it uses cert-manager CRs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ca
  namespace: argocd
  labels:
    infra.platform/git-source: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main  # Git branch or tag to sync from
    path: gitops/platform/cert-manager/overlays/staging  # Staging-specific CA overlay
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager  # CA secrets and issuers live next to cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-base — Istio CRDs and cluster-wide foundations
# -----------------------------------------------------------------------------
# Installs Istio "base" chart: CRDs and shared config. Does not run the control
# plane yet; that is istiod. Service mesh features need this layer first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: '*'
    helm:
      releaseName: istio-base
      values: |
        defaultRevision: default  # Label Istio resources with revision "default"
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system  # Standard namespace for Istio control plane components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-csr — cert-manager integration for Istio TLS
# -----------------------------------------------------------------------------
# Must install before istiod (cert-manager docs: istio-csr before Istio).
# Uses cert-manager to issue TLS certs for istiod instead of Istio's built-in CA.
# Connects to platform-ca-issuer so the whole mesh shares one trust root.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-csr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager-istio-csr
    targetRevision: '*'
    helm:
      releaseName: istio-csr
      values: |
        app:
          certmanager:
            namespace: istio-system
            issuer:
              enabled: true
              name: platform-ca-issuer  # Our cluster-wide CA from platform-ca app
              kind: ClusterIssuer
              group: cert-manager.io
          tls:
            istiodCertificateEnable: true
            istiodAdditionalDNSNames:
              - istiod.istio-system.svc  # SAN on the cert istiod presents
          istio:
            namespace: istio-system
            revisions:
              - default
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istiod — Istio control plane (mesh brain)
# -----------------------------------------------------------------------------
# Runs istiod: discovery, config distribution, and certificates for sidecars.
# Configured for cert-manager istio-csr (built-in CA disabled). Staging enables
# Zipkin tracing in mesh defaults for easier debugging.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: '*'
    helm:
      releaseName: istiod
      values: |
        global:
          istioNamespace: istio-system
          caAddress: cert-manager-istio-csr.cert-manager.svc:443
        pilot:
          env:
            ENABLE_CA_SERVER: "false"
        meshConfig:
          enablePrometheusMerge: true  # Merge app and Envoy metrics for Prometheus
          defaultConfig:
            tracing:
              zipkin:
                # Send trace spans to Zipkin in istio-system (staging observability)
                address: zipkin.istio-system:9411
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-gateway — Ingress gateway (north-south traffic)
# -----------------------------------------------------------------------------
# Deploys the Istio ingress gateway after istiod is healthy so the mutating
# webhook can resolve image: auto via the gateway injection template.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: '*'
    helm:
      releaseName: istio-ingressgateway
      values: |
        name: istio-ingressgateway
        service:
          type: LoadBalancer  # Expose gateway outside the cluster (cloud LB)
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-ingress-tls — Gateway TLS certificate and HTTPS listener
# -----------------------------------------------------------------------------
# Issues an ingress cert from platform-ca-issuer and configures the Istio
# Gateway for HTTPS on the gateway hostname (see cluster.env / overlay).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingress-tls
  namespace: argocd
  labels:
    infra.platform/git-source: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/istio/ingress-tls/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# istio-policies — Mesh-wide security defaults (mTLS STRICT)
# -----------------------------------------------------------------------------
# Applies PeerAuthentication policies from Git so all mesh traffic uses mutual
# TLS. Demo and production workloads inherit these defaults once sidecars exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-policies
  namespace: argocd
  labels:
    infra.platform/git-source: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/istio/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# -----------------------------------------------------------------------------
# monitoring — Prometheus, Grafana, and Alertmanager
# -----------------------------------------------------------------------------
# Full observability stack for metrics and dashboards. Staging keeps 15 days of
# Prometheus data; change adminPassword before any real use.
# Alertmanager uses the null receiver (lab default) — alerts are visible in the
# UI only; see docs/operations/alerting.md to wire Slack or PagerDuty.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: '*'
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true
          adminPassword: changeme  # Staging only — prod uses existingSecret
        prometheus:
          prometheusSpec:
            retention: 15d  # How long staging keeps time-series metrics
            # Discover ServiceMonitors/PodMonitors cluster-wide, not only Helm-owned ones
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: 'null'
              group_by: ['alertname', 'namespace']
            receivers:
              - name: 'null'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# monitoring-alerts — Prometheus alerting rules
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-alerts
  namespace: argocd
  labels:
