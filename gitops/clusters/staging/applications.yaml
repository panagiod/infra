# -----------------------------------------------------------------------------
# couchbase — Couchbase Autonomous Operator + single-node cluster (staging)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: couchbase
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://couchbase-partners.github.io/helm-charts
    chart: couchbase-operator
    targetRevision: "2.64.1"
    helm:
      releaseName: couchbase
      values: |
        install:
          couchbaseOperator: true
          admissionController: false
          couchbaseCluster: true
          syncGateway: false
        cluster:
          image: couchbase/server:community-7.6.0
          antiAffinity: false
          name: couchbase
          security:
            adminSecret: couchbase-admin-secret
          cluster:
            dataServiceMemoryQuota: 256Mi
            indexServiceMemoryQuota: 256Mi
            queryServiceMemoryQuota: 256Mi
          servers:
            default:
              size: 1
              services:
                - data
                - index
                - query
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                storageClassName: standard
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
        buckets:
          default: null
          kubeship:
            memoryQuota: 100Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: couchbase
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# kubeship — Shipping management API (Couchbase-backed)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeship
  namespace: argocd
