  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# -----------------------------------------------------------------------------
# kyverno — Policy engine for cluster guardrails
# -----------------------------------------------------------------------------
# Installs Kyverno to validate and mutate Kubernetes resources (e.g. require
# labels, block unsafe pods). platform-policies deploys rules that use Kyverno.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: '*'
    helm:
      releaseName: kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# -----------------------------------------------------------------------------
# platform-policies — Kyverno policies from Git (cluster standards)
# -----------------------------------------------------------------------------
# Deploys ClusterPolicy manifests (e.g. require Istio injection on demo ns).
# Runs after Kyverno is installed so the admission webhook can enforce rules.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-policies
  namespace: argocd
  labels:
    infra.platform/git-source: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/panagiod/infra
    targetRevision: main
    path: gitops/platform/policies/base
  destination:
    server: https://kubernetes.default.svc
    # No namespace: ClusterPolicy resources are cluster-scoped
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
