# Production overlay for mTLS demo — higher availability with 2 replicas each.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonLabels:
  environment: prod

# Scale frontend and backend for basic redundancy in production.
replicas:
  - name: backend
    count: 2  # Two backend pods behind the Service
  - name: frontend
    count: 2  # Two frontend pods issuing health checks to backend
