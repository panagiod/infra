apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonLabels:
  environment: prod

configMapGenerator:
  - name: kubeship-ingress
    literals:
      - PUBLIC_HOST=kubeship.prod.gateway.example.com
    options:
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: kubeship-ingress
      fieldPath: data.PUBLIC_HOST
    targets:
      - select:
          kind: VirtualService
          name: kubeship-public
        fieldPaths:
          - spec.hosts.0

images:
  - name: kubeship:ci
    newName: ghcr.io/panagiod/infra/kubeship
    newTag: v0.0.0  # placeholder — set by .github/workflows/release.yml
