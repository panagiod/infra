# Argo CD values for local/kind bootstrap — requires v2.14+ for Application spec.dependsOn.
global:
  image:
    tag: v2.14.20

configs:
  params:
    server.insecure: true
  cm:
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

server:
  service:
    type: ClusterIP
  ingress:
    enabled: false

applicationSet:
  enabled: true

dex:
  enabled: false

notifications:
  enabled: false
