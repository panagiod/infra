# Workflow name shown in the GitHub Actions UI
name: Terraform

# Run when Terraform files change on pull requests or pushes to main
on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Validate both staging and prod root modules in parallel
        environment: [staging, prod]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      # Install the latest stable Terraform CLI
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      # Fail the job if files are not formatted with terraform fmt
      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      # Download providers and modules without configuring remote S3 backend
      - name: Terraform init
        run: terraform init -backend=false

      # Syntax-check modules and provider schemas
      - name: Terraform validate
        run: terraform validate
