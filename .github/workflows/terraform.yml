# Workflow name shown in the GitHub Actions UI
name: Terraform

# Run when Terraform files change on pull requests or pushes to main
on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform fmt
        run: terraform fmt -check -recursive .

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - name: aws-staging
            working_directory: terraform/environments/staging
          - name: aws-prod
            working_directory: terraform/environments/prod
          - name: azure-staging
            working_directory: terraform/environments/azure/staging
          - name: azure-prod
            working_directory: terraform/environments/azure/prod
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
