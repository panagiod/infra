# One-time sync: push corrected scaffold to panagiod/myapp without local commands.
#
# Setup (GitHub UI only — no terminal):
#   1. github.com/panagiod/myapp → Settings → Collaborators → Add `cursor[bot]` (Write)
#      OR create a fine-grained PAT (Contents: Read and write on myapp) and add repo secret:
#   2. github.com/panagiod/infra → Settings → Secrets → Actions → MYAPP_REPO_TOKEN
#   3. Actions → Sync myapp scaffold → Run workflow
name: Sync myapp scaffold

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scaffold myapp into workspace
        run: |
          chmod +x scripts/scaffold-application-repo.sh
          ./scripts/scaffold-application-repo.sh myapp /tmp/myapp panagiod/myapp

      - name: Push to panagiod/myapp
        env:
          MYAPP_REPO_TOKEN: ${{ secrets.MYAPP_REPO_TOKEN }}
        run: |
          if [[ -z "${MYAPP_REPO_TOKEN}" ]]; then
            echo "ERROR: Add MYAPP_REPO_TOKEN in infra repo Settings → Secrets → Actions"
            echo "Or grant cursor[bot] Write on panagiod/myapp and ask the Cloud Agent to push."
            exit 1
          fi
          cd /tmp/myapp
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: sync scaffold from panagiod/infra"
          git remote add origin "https://x-access-token:${MYAPP_REPO_TOKEN}@github.com/panagiod/myapp.git"
          git push -f origin main
