# Ephemeral kind cluster smoke test — validates GitOps bootstrap without cloud cost.
name: Kind smoke

on:
  pull_request:
    paths:
      - 'gitops/**'
      - 'hack/kind/**'
      - 'hack/argocd/**'
      - 'scripts/bootstrap-local.sh'
      - 'scripts/wait-for-app.sh'
      - 'scripts/verify-platform.sh'
      - '.github/workflows/kind-smoke.yml'
  workflow_dispatch:
    inputs:
      gitops_revision:
        description: 'Branch or tag to bootstrap (default: branch that triggered the run)'
        required: false

# Cancel an in-progress run when the same PR gets a new push (saves Actions minutes)
concurrency:
  group: kind-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GITOPS_REPO_URL: https://github.com/${{ github.repository }}
      GITOPS_REVISION: ${{ github.event.inputs.gitops_revision || github.head_ref || github.ref_name }}
      CLUSTER_NAME: infra-local
      INSTALL_METALLB: "false"
      RECREATE_CLUSTER: "false"
      STRICT_WAIT: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.gitops_revision || github.head_ref || github.ref }}

      - uses: helm/kind-action@v1
        with:
          cluster_name: infra-local
          config: hack/kind/cluster.yaml

      - uses: azure/setup-kubectl@v4

      - uses: azure/setup-helm@v4

      - name: Prepare bootstrap scripts
        run: chmod +x scripts/bootstrap-local.sh scripts/wait-for-app.sh scripts/verify-platform.sh

      - name: Install MetalLB
        run: |
          kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
          kubectl -n metallb-system rollout status deploy/controller --timeout=180s
          kubectl apply -f hack/kind/metallb.yaml

      - name: Platform 1/15 — Install Argo CD
        run: BOOTSTRAP_PHASE=argocd ./scripts/bootstrap-local.sh

      - name: Platform 2/15 — Register cluster-root Application
        run: BOOTSTRAP_PHASE=cluster-root ./scripts/bootstrap-local.sh

      - name: Platform 3/15 — Wait cert-manager
        run: WAIT_TIMEOUT=600 ./scripts/wait-for-app.sh cert-manager

      - name: Platform 4/15 — Wait platform-ca
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh platform-ca

      - name: Platform 5/15 — Wait istio-base
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh istio-base

      - name: Platform 6/15 — Wait istiod
        run: WAIT_TIMEOUT=600 ./scripts/wait-for-app.sh istiod

      - name: Platform 7/15 — Wait istio-csr
        run: WAIT_TIMEOUT=600 ./scripts/wait-for-app.sh istio-csr

      - name: Platform 8/15 — Wait istio-gateway
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh istio-gateway

      - name: Platform 9/15 — Wait istio-ingress-tls
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh istio-ingress-tls

      - name: Platform 10/15 — Wait istio-policies
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh istio-policies

      - name: Platform 11/15 — Wait monitoring
        run: WAIT_TIMEOUT=900 ./scripts/wait-for-app.sh monitoring

      - name: Platform 12/15 — Wait monitoring-alerts
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh monitoring-alerts

      - name: Platform 13/15 — Wait kyverno
        run: WAIT_TIMEOUT=600 ./scripts/wait-for-app.sh kyverno

      - name: Platform 14/15 — Wait platform-policies
        run: WAIT_TIMEOUT=300 ./scripts/wait-for-app.sh platform-policies

      - name: Platform 15/15 — Wait mtls-demo
        run: WAIT_TIMEOUT=600 ./scripts/wait-for-app.sh mtls-demo

      - name: Verify core platform health
        env:
          LOCAL: "true"
        run: |
          for attempt in $(seq 1 6); do
            echo "Verify attempt ${attempt}/6"
            if ./scripts/verify-platform.sh; then
              exit 0
            fi
            if [[ "${attempt}" -lt 6 ]]; then
              echo "Platform still syncing — retrying in 60s..."
              sleep 60
            fi
          done
          echo "--- Argo CD applications ---"
          kubectl -n argocd get applications -o wide || true
          exit 1

      - name: Tear down kind cluster
        if: always()
        run: kind delete cluster --name infra-local || true
